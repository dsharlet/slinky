name: ci
on:
  pull_request:
  push:
    tags:
    branches:
      - main

jobs:
  # We don't want to run clang-format as a presubmit requirement at this time,
  # but here's all that's needed if that changes in the future:
  #
  # check_clang_format:
  #   name: Check clang-format
  #   runs-on: ubuntu-20.04
  #   steps:
  #     - uses: actions/checkout@v3
  #     - uses: DoozyX/clang-format-lint-action@v0.17
  #       with:
  #         source: '.'
  #         extensions: 'h,cc'
  #         clangFormatVersion: 17

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      - name: Setup Cpp
        uses: aminya/setup-cpp@v1

      - name: Build and test
        run: bazel test --test_output=errors ...

      - name: Build and test with ASAN
        run: bazel test --config=asan --copt=-Os --test_output=errors ...

      - name: Shut down bazel
        run: bazel shutdown

  build_cmake:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v3

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure -j$(nproc)